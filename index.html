<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster Template</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --title-bg: #d6ecf5;
    --refs-bg: #e0dbd0;
    --accent: #2d1b8e;
    --accent-light: #4a35b0;
    --text-dark: #1a1a2e;
    --text-mid: #3a3a5c;
    --line: #4a35b0;
    --img-bg: #d6ecf5;
    --a3-landscape-w: 420mm;
    --a3-landscape-h: 297mm;
    --a3-portrait-w: 297mm;
    --a3-portrait-h: 420mm;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #c8c4bc;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 20px;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    position: fixed;
    right: -184px;
    top: 50%;
    transform: translateY(-50%);
    width: 184px;
    background: #fff;
    border-radius: 12px 0 0 12px;
    box-shadow: -4px 0 24px rgba(0,0,0,0.14);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: right 0.32s cubic-bezier(.4,0,.2,1);
    z-index: 1000;
  }
  #sidebar:hover, #sidebar.open { right: 0; }
  #sidebar-tab {
    position: absolute;
    left: -38px; top: 50%;
    transform: translateY(-50%);
    width: 38px; height: 80px;
    background: #fff;
    border-radius: 8px 0 0 8px;
    box-shadow: -3px 0 12px rgba(0,0,0,0.10);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    writing-mode: vertical-rl;
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--accent); text-transform: uppercase; user-select: none;
  }
  #sidebar-tab::before { content: '⚙'; writing-mode: horizontal-tb; font-size: 18px; display: block; margin-bottom: 4px; }
  #sidebar h3 { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid); border-bottom: 1px solid #eee; padding-bottom: 8px; }
  .sidebar-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.18s, transform 0.12s; width: 100%; text-align: left;
  }
  .sidebar-btn:hover { transform: scale(1.03); }
  .sidebar-btn:active { transform: scale(0.97); }
  .btn-pdf { background: #1a1a2e; color: #fff; }
  .btn-pdf:hover { background: #2d1b8e; }
  .btn-orientation { background: rgba(74,53,176,0.1); color: var(--accent); }
  .btn-add-row { background: rgba(74,53,176,0.1); color: var(--accent); }
  .btn-reset { background: #f3f0ff; color: var(--accent); }
  .btn-clear-img { background: #fff3f0; color: #c0392b; }
  .colour-row { display: flex; align-items: center; gap: 8px; padding: 6px 4px 2px; }
  .colour-row label { font-size: 12px; color: var(--text-mid); flex: 1; white-space: nowrap; }
  #header-colour-swatch { width: 28px; height: 28px; border-radius: 6px; border: 2px solid #ddd; cursor: pointer; flex-shrink: 0; }
  #header-colour-swatch:hover { border-color: #aaa; }
  #header-hex-input { width: 72px; font-size: 11px; font-family: monospace; padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px; outline: none; color: var(--text-dark); background: #fafafa; }
  #header-hex-input:focus { border-color: #4a35b0; }

  /* POSTER VIEWPORT */
  #poster-viewport { position: relative; flex-shrink: 0; }
  #poster {
    width: var(--a3-landscape-w);
    height: var(--a3-landscape-h);
    background: var(--bg);
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    position: relative;
    transform-origin: top left;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body.portrait-mode #poster { width: var(--a3-portrait-w); height: var(--a3-portrait-h); }

  /* HEADER */
  .poster-header {
    background: var(--title-bg);
    padding: 16px 48px 10px;
    text-align: center;
    position: relative;
    flex-shrink: 0;
  }

  [contenteditable] {
    outline: none; border-radius: 3px;
    transition: background 0.15s, box-shadow 0.15s; cursor: text;
  }
  [contenteditable]:hover { background: rgba(74,53,176,0.06); }
  [contenteditable]:focus { background: rgba(255,255,255,0.75); box-shadow: 0 0 0 2px rgba(74,53,176,0.28); }

  #poster-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28pt; font-weight: 700;
    color: var(--text-dark); letter-spacing: 0.03em;
    min-height: 1.2em; display: block; padding: 2px 8px; line-height: 1.25;
  }
  #student-name {
    font-size: 12pt; font-weight: 400; color: var(--text-dark);
    margin-top: 4px; display: inline-block; padding: 2px 8px; min-width: 120px;
  }

  /* BODY */
  .poster-body {
    display: flex; flex-direction: column;
    padding: 14px 22px 10px;
    gap: 0;
    flex: 1 1 auto; min-height: 0; overflow: hidden;
  }

  /* Word count */
  #wordCount {
    position: absolute; top: 6px; right: 10px;
    font-size: 10px; color: rgba(74,53,176,0.6); pointer-events: none;
    background: rgba(214,236,245,0.9); padding: 2px 7px; border-radius: 4px; z-index: 5;
  }

  /* ── ROW SYSTEM ── */
  .poster-row {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    margin-bottom: 10px;
    position: relative;
  }
  .poster-row.dragging-row { opacity: 0.45; outline: 2px dashed rgba(74,53,176,0.4); outline-offset: 2px; }
  #poster-body { position: relative; }

  /* Drag handle bar above each row */
  .row-drag-handle {
    width: 100%;
    height: 10px;
    cursor: grab;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-bottom: 4px;
    position: relative;
  }
  .row-drag-handle::after {
    content: '';
    display: block; height: 2px; width: 50%;
    background: rgba(74,53,176,0.15); border-radius: 2px;
    transition: background 0.15s, height 0.15s;
  }
  .row-drag-handle:hover::after, .row-drag-handle.active::after { background: rgba(74,53,176,0.5); height: 3px; }
  .row-drag-handle::before {
    content: '⋯';
    position: absolute; left: 50%; transform: translateX(-50%);
    color: rgba(74,53,176,0.2); font-size: 11px; pointer-events: none;
    transition: color 0.15s;
  }
  .row-drag-handle:hover::before, .row-drag-handle.active::before { color: rgba(74,53,176,0.55); }

  /* Row content: flex row of elements */
  .row-content {
    display: flex;
    flex-direction: row;
    gap: 10px;
    width: 100%;
    align-items: stretch;
    min-height: 80px;
  }

  /* Section label row */
  .row-label-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .row-section-label {
    font-size: 9pt; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent);
    border-bottom: 1.5px solid var(--line);
    flex: 1;
    padding-bottom: 3px;
    min-width: 40px;
  }

  /* Add element button */
  .row-add-btn {
    width: 22px; height: 22px;
    background: rgba(74,53,176,0.08);
    border: 1.5px dashed rgba(74,53,176,0.35);
    border-radius: 50%;
    color: var(--accent);
    font-size: 14px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    padding: 0;
  }
  .row-add-btn:hover { background: rgba(74,53,176,0.16); border-color: rgba(74,53,176,0.6); }

  /* Row delete button */
  .row-delete-btn {
    width: 18px; height: 18px;
    background: rgba(192,57,43,0.08);
    border: 1px solid rgba(192,57,43,0.25);
    border-radius: 50%;
    color: #c0392b; font-size: 10px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    padding: 0;
  }
  .row-delete-btn:hover { background: rgba(192,57,43,0.18); }

  /* ── ELEMENT: TEXT ── */
  .row-element {
    flex: 1 1 0;
    min-width: 60px;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .element-remove {
    position: absolute; top: 3px; right: 3px;
    width: 16px; height: 16px;
    background: rgba(26,26,46,0.65); color: #fff;
    border: none; border-radius: 50%; font-size: 9px;
    cursor: pointer; display: none;
    align-items: center; justify-content: center;
    z-index: 10; padding: 0;
    transition: background 0.15s;
  }
  .element-remove:hover { background: #c0392b; }
  .row-element:hover .element-remove { display: flex; }

  .element-text {
    flex: 1 1 auto;
    background: transparent; border: none;
    font-family: 'Figtree', sans-serif; font-size: 9pt; line-height: 1.55;
    text-align: justify; color: var(--text-dark);
    padding: 0; outline: none;
    border-radius: 3px;
    word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap;
    min-height: 60px;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .element-text:hover { background: rgba(74,53,176,0.04); }
  .element-text:focus { background: rgba(255,255,255,0.6); box-shadow: 0 0 0 2px rgba(74,53,176,0.18); padding: 3px; }
  .element-text.ph { color: #bbb; font-style: italic; }

  /* ── ELEMENT: IMAGE ── */
  .element-image {
    flex: 1 1 0;
    min-width: 60px;
    min-height: 80px;
    position: relative;
    display: flex;
    align-items: center; justify-content: center;
    background: var(--img-bg);
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    border: 1.5px dashed rgba(74,53,176,0.2);
    transition: border-color 0.2s;
  }
  .element-image.has-image { border: 1.5px solid rgba(74,53,176,0.12); cursor: default; }
  .element-image img {
    position: absolute; top:0; left:0;
    width:100%; height:100%; object-fit: contain;
    pointer-events: none; display: block;
  }
  .element-image .img-ph {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: rgba(74,53,176,0.4); font-size: 7pt; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase; text-align: center;
    user-select: none; padding: 10px;
  }
  .element-image .img-ph .ph-icon { font-size: 1.4rem; opacity: 0.5; }
  .element-image .element-remove { display: none; }
  .element-image.has-image:hover .element-remove { display: flex; }

  /* FOOTER */
  .poster-footer {
    background: var(--refs-bg);
    padding: 8px 22px;
    text-align: left; flex-shrink: 0;
  }
  .refs-label {
    font-size: 7pt; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: #6b6050;
    display: block; margin-bottom: 4px;
  }
  #refs-content {
    font-size: 6pt; color: var(--text-dark);
    min-height: 1em; padding: 1px 4px;
    display: block; text-align: justify; line-height: 1.5;
  }

  /* MODAL */
  #element-modal {
    display: none; position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.38); z-index: 2000;
    align-items: center; justify-content: center;
  }
  #element-modal.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 12px; padding: 24px 28px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2); text-align: center; max-width: 340px;
    animation: modalUp 0.25s cubic-bezier(.4,0,.2,1);
  }
  @keyframes modalUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-box h2 { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 14px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1; padding: 10px 14px;
    border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.18s, transform 0.1s;
  }
  .modal-btn:hover { transform: scale(1.02); }
  .modal-btn-text { background: rgba(74,53,176,0.1); color: var(--accent); }
  .modal-btn-text:hover { background: rgba(74,53,176,0.18); }
  .modal-btn-img { background: rgba(74,53,176,0.1); color: var(--accent); }
  .modal-btn-img:hover { background: rgba(74,53,176,0.18); }
  .modal-btn-cancel { background: #f5f5f5; color: #666; margin-top: 10px; width: 100%; }
  .modal-btn-cancel:hover { background: #eee; }

  /* PRINT */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { margin:0!important; padding:0!important; background:white!important; display:block!important; overflow:visible!important; }
    body > * { display: none !important; }
    #poster-viewport { display: block !important; }
    #poster-viewport > #poster { display: flex !important; }
    #sidebar { display: none !important; }
    .row-drag-handle { display: none !important; }
    .row-add-btn, .row-delete-btn { display: none !important; }
    .element-remove { display: none !important; }
    [contenteditable]:hover, [contenteditable]:focus { background: none !important; box-shadow: none !important; }
    .poster-header { background: var(--title-bg) !important; }
    .poster-footer { background: #e0dbd0 !important; }
    #poster-viewport { width: auto!important; height: auto!important; position: static!important; overflow:visible!important; }
    #poster { transform: none!important; box-shadow: none!important; margin:0!important; position:static!important; overflow:visible!important; }
  }
</style>
<style id="orientation-styles"></style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-tab">Tools</div>
  <h3>Poster Tools</h3>
  <button class="sidebar-btn btn-pdf" onclick="window.print()">🖨 Print / Save PDF</button>
  <button class="sidebar-btn btn-orientation" onclick="toggleOrientation()">📐 <span id="orient-text">Portrait</span></button>
  <button class="sidebar-btn btn-add-row" onclick="addRow()">➕ Add Row</button>
  <div style="border-top:1px solid #eee;margin:2px 0;"></div>
  <div style="font-size:11px;font-weight:600;color:var(--text-mid);padding:2px 0 4px;">Header Colour</div>
  <div class="colour-row">
    <div id="header-colour-swatch" onclick="document.getElementById('hcn').click()" title="Pick colour"></div>
    <input type="text" id="header-hex-input" maxlength="7" placeholder="#d6ecf5" value="#d6ecf5" oninput="onHexInput(this.value)" onblur="onHexBlur(this.value)">
    <input type="color" id="hcn" value="#d6ecf5" style="display:none" oninput="onNativePick(this.value)">
  </div>
  <button class="sidebar-btn btn-clear-img" onclick="resetImages()">🗑 Reset Images</button>
  <button class="sidebar-btn btn-reset" onclick="resetAll()">↺ Reset All</button>
  <div style="font-size:9px;color:#bbb;line-height:1.4;padding-top:8px;border-top:1px solid #eee;">✓ Auto-saved to browser</div>
</div>

<!-- POSTER -->
<div id="poster-viewport">
<div id="poster">
  <span id="wordCount">Words: 0</span>

  <div class="poster-header">
    <span id="poster-title" contenteditable="true" data-ph="TITLE">TITLE</span><br>
    <span id="student-name" contenteditable="true" data-ph="Student name">Student name</span>
  </div>

  <div class="poster-body" id="poster-body">
    <!-- rows injected here -->
  </div>

  <div class="poster-footer">
    <span class="refs-label">References &amp; Acknowledgements</span>
    <span id="refs-content" contenteditable="true" data-ph="Referencing and acknowledgement of all quotations and sourced content."> </span>
  </div>
</div>
</div>

<!-- MODAL -->
<div id="element-modal">
  <div class="modal-box">
    <h2>Add to row</h2>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-text" onclick="modalPick('text')">📝 Text</button>
      <button class="modal-btn modal-btn-img" onclick="modalPick('image')">🖼 Image</button>
    </div>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none">

<script>
// ── STATE ──────────────────────────────────────
const SK       = 'vce_poster_v3';
const SK_IMGS  = 'vce_poster_v3_imgs';
const SK_OR    = 'vce_poster_v3_orient';
const SK_COL   = 'vce_poster_v3_colour';
const DEFAULT_COLOUR = '#d6ecf5';

let rowIdCounter = 0;
let elemIdCounter = 0;
let pendingImageTarget = null; // { rowId, elemId }
let pendingModalRowId = null;
let loading = false;

// A3 mm → px (96 dpi)
const MM = 96 / 25.4;
const A3L = { w: 420, h: 297 };
const A3P = { w: 297, h: 420 };

// ── VIEWPORT SCALING ──────────────────────────
function fit() {
  const portrait = document.body.classList.contains('portrait-mode');
  const dim = portrait ? A3P : A3L;
  const pw = Math.round(dim.w * MM), ph = Math.round(dim.h * MM);
  const avW = window.innerWidth - 80, avH = window.innerHeight - 64;
  const scale = Math.min(avW / pw, avH / ph, 1);
  const poster = document.getElementById('poster');
  const vp = document.getElementById('poster-viewport');
  poster.style.transform = `scale(${scale})`;
  vp.style.width  = Math.round(pw * scale) + 'px';
  vp.style.height = Math.round(ph * scale) + 'px';
  vp.style.overflow = 'hidden';
}
window.addEventListener('resize', fit);

// ── ORIENTATION ───────────────────────────────
function toggleOrientation() {
  const p = document.body.classList.toggle('portrait-mode');
  document.getElementById('orient-text').textContent = p ? 'Landscape' : 'Portrait';
  document.getElementById('orientation-styles').textContent =
    p ? '@media print{@page{size:A3 portrait;margin:0}}' : '@media print{@page{size:A3 landscape;margin:0}}';
  localStorage.setItem(SK_OR, p ? 'portrait' : 'landscape');
  fit();
}

// ── COLOUR ────────────────────────────────────
function applyColour(hex) {
  document.documentElement.style.setProperty('--title-bg', hex);
  document.getElementById('header-colour-swatch').style.background = hex;
  document.getElementById('header-hex-input').value = hex;
  document.getElementById('hcn').value = hex;
}
function onNativePick(v) { applyColour(v); localStorage.setItem(SK_COL, v); scheduleSave(); }
function onHexInput(v) { const h = v.startsWith('#') ? v : '#'+v; if (/^#[0-9a-fA-F]{6}$/.test(h)) { applyColour(h); localStorage.setItem(SK_COL, h); } }
function onHexBlur(v) { const h = v.startsWith('#') ? v : '#'+v; if (!/^#[0-9a-fA-F]{6}$/.test(h)) applyColour(localStorage.getItem(SK_COL) || DEFAULT_COLOUR); }

// ── ROW CREATION ─────────────────────────────
function makeRowId() { return 'row-' + (rowIdCounter++); }
function makeElemId() { return 'elem-' + (elemIdCounter++); }

function addRow(opts) {
  // opts: { id, labelText, elements: [{type,content,imgSrc}] }
  const id = (opts && opts.id) || makeRowId();
  const body = document.getElementById('poster-body');
  const row = document.createElement('div');
  row.className = 'poster-row';
  row.dataset.rowId = id;

  // Drag handle
  const handle = document.createElement('div');
  handle.className = 'row-drag-handle';
  handle.title = 'Drag to reorder';
  attachRowDrag(handle, row);

  // Label bar
  const labelBar = document.createElement('div');
  labelBar.className = 'row-label-bar';

  const labelEl = document.createElement('span');
  labelEl.className = 'row-section-label';
  labelEl.contentEditable = true;
  labelEl.dataset.ph = 'Section Title';
  labelEl.textContent = (opts && opts.labelText) || 'Section Title';
  attachCEPlaceholder(labelEl);

  const addBtn = document.createElement('button');
  addBtn.className = 'row-add-btn';
  addBtn.title = 'Add text or image';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', (e) => { e.stopPropagation(); openModal(id); });

  const delBtn = document.createElement('button');
  delBtn.className = 'row-delete-btn';
  delBtn.title = 'Remove row';
  delBtn.textContent = '×';
  delBtn.addEventListener('click', () => { if(confirm('Remove this row?')) { row.remove(); scheduleSave(); } });

  labelBar.appendChild(labelEl);
  labelBar.appendChild(addBtn);
  labelBar.appendChild(delBtn);

  // Content
  const content = document.createElement('div');
  content.className = 'row-content';
  content.dataset.rowId = id;

  row.appendChild(handle);
  row.appendChild(labelBar);
  row.appendChild(content);
  body.appendChild(row);

  // Add initial elements if provided
  if (opts && opts.elements) {
    opts.elements.forEach(el => {
      if (el.type === 'text') addTextElement(content, el.content);
      else if (el.type === 'image') addImageElement(content, el.imgSrc);
    });
  }

  if (!loading) scheduleSave();
  return { row, content, id };
}

// ── ELEMENT CREATION ─────────────────────────
function addTextElement(contentEl, initialText) {
  const id = makeElemId();
  const wrap = document.createElement('div');
  wrap.className = 'row-element';
  wrap.dataset.elemId = id;
  wrap.dataset.elemType = 'text';

  const removeBtn = document.createElement('button');
  removeBtn.className = 'element-remove';
  removeBtn.textContent = '×';
  removeBtn.addEventListener('click', (e) => { e.stopPropagation(); wrap.remove(); scheduleSave(); });

  const ta = document.createElement('div');
  ta.className = 'element-text';
  ta.contentEditable = true;
  ta.dataset.ph = 'Enter text here…';
  if (initialText) { ta.innerHTML = initialText; } else { ta.classList.add('ph'); ta.textContent = 'Enter text here…'; }
  attachCEPlaceholder(ta);

  wrap.appendChild(removeBtn);
  wrap.appendChild(ta);
  contentEl.appendChild(wrap);
  if (!loading) scheduleSave();
}

function addImageElement(contentEl, imgSrc) {
  const id = makeElemId();
  const wrap = document.createElement('div');
  wrap.className = 'row-element';
  wrap.dataset.elemId = id;
  wrap.dataset.elemType = 'image';

  const imgDiv = document.createElement('div');
  imgDiv.className = 'element-image';
  imgDiv.dataset.elemId = id;

  const ph = document.createElement('div');
  ph.className = 'img-ph';
  ph.innerHTML = '<span class="ph-icon">📊</span><span>Click to add image</span>';
  imgDiv.appendChild(ph);

  const removeBtn = document.createElement('button');
  removeBtn.className = 'element-remove';
  removeBtn.textContent = '×';
  removeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const img = imgDiv.querySelector('img');
    if (img) img.remove();
    imgDiv.classList.remove('has-image');
    ph.style.display = '';
    imgDiv.style.cursor = 'pointer';
    scheduleSave();
  });
  imgDiv.appendChild(removeBtn);

  imgDiv.addEventListener('click', () => {
    if (imgDiv.classList.contains('has-image')) return;
    pendingImageTarget = { elemId: id };
    document.getElementById('file-input').click();
  });

  if (imgSrc) {
    setElemImage(imgDiv, ph, imgSrc);
  }

  wrap.appendChild(imgDiv);
  contentEl.appendChild(wrap);
  if (!loading) scheduleSave();
  return { wrap, imgDiv, ph, id };
}

function setElemImage(imgDiv, ph, src) {
  const old = imgDiv.querySelector('img');
  if (old) old.remove();
  const img = document.createElement('img');
  img.src = src; img.alt = 'Image';
  imgDiv.insertBefore(img, imgDiv.querySelector('.element-remove'));
  imgDiv.classList.add('has-image');
  if (ph) ph.style.display = 'none';
}

// ── FILE INPUT ────────────────────────────────
document.getElementById('file-input').addEventListener('change', async function(e) {
  const file = e.target.files[0]; if (!file) return;
  const src = await compressImage(await readFile(file));
  if (pendingImageTarget) {
    const imgDiv = document.querySelector(`.element-image[data-elem-id="${pendingImageTarget.elemId}"]`);
    if (imgDiv) {
      const ph = imgDiv.querySelector('.img-ph');
      setElemImage(imgDiv, ph, src);
      scheduleSave();
    }
    pendingImageTarget = null;
  }
  e.target.value = '';
});

function readFile(file) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = ev => res(ev.target.result); r.onerror = rej; r.readAsDataURL(file); });
}

function compressImage(dataURL, maxDim=2000, q=0.88) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) { if (w > h) { h = Math.round(h*maxDim/w); w = maxDim; } else { w = Math.round(w*maxDim/h); h = maxDim; } }
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror = () => res(dataURL);
    img.src = dataURL;
  });
}

// ── MODAL ─────────────────────────────────────
function openModal(rowId) { pendingModalRowId = rowId; document.getElementById('element-modal').classList.add('open'); }
function closeModal() { document.getElementById('element-modal').classList.remove('open'); pendingModalRowId = null; }
function modalPick(type) {
  closeModal();
  if (!pendingModalRowId) return;
  const content = document.querySelector(`.row-content[data-row-id="${pendingModalRowId}"]`);
  if (!content) return;
  if (type === 'text') addTextElement(content);
  else addImageElement(content);
}
document.getElementById('element-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ── ROW DRAG ──────────────────────────────────
// Uses offsetTop of each row relative to poster-body (unaffected by CSS scale),
// then converts the raw mouse position into poster-body local Y by accounting for scale.

function getScale() {
  const poster = document.getElementById('poster');
  const t = poster.style.transform || '';
  const m = t.match(/scale\(([\d.]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}

let dragSrcRow = null;
function attachRowDrag(handle, row) {
  handle.addEventListener('mousedown', startRowDrag);
  handle.addEventListener('touchstart', startRowDrag, { passive: false });

  function startRowDrag(e) {
    e.preventDefault();
    handle.classList.add('active');
    dragSrcRow = row;
    row.classList.add('dragging-row');

    // Ghost indicator line
    const indicator = document.createElement('div');
    indicator.id = 'drag-indicator';
    indicator.style.cssText = 'position:absolute;left:0;right:0;height:3px;background:var(--accent-light);border-radius:2px;pointer-events:none;z-index:999;display:none;';
    document.getElementById('poster-body').appendChild(indicator);

    function clientY(ev) { return ev.touches ? ev.touches[0].clientY : ev.clientY; }

    function getLocalY(ev) {
      // Convert screen Y → poster-body local Y (unscaled coordinates)
      const scale = getScale();
      const vpRect = document.getElementById('poster-viewport').getBoundingClientRect();
      const bodyEl = document.getElementById('poster-body');
      // poster-body offsetTop within the poster (unscaled)
      const bodyOffsetTop = bodyEl.offsetTop;
      // screen top of the poster
      const posterScreenTop = vpRect.top;
      // raw screen Y relative to poster top, divided by scale = unscaled Y from poster top
      const localFromPosterTop = (clientY(ev) - posterScreenTop) / scale;
      return localFromPosterTop - bodyOffsetTop;
    }

    function findInsertionIndex(localY) {
      const body = document.getElementById('poster-body');
      const rows = Array.from(body.querySelectorAll('.poster-row'));
      // Use offsetTop + offsetHeight which are in unscaled px
      for (let i = 0; i < rows.length; i++) {
        if (rows[i] === dragSrcRow) continue;
        const mid = rows[i].offsetTop + rows[i].offsetHeight / 2;
        if (localY < mid) return i;
      }
      return rows.length;
    }

    function onMove(ev) {
      const localY = getLocalY(ev);
      const body = document.getElementById('poster-body');
      const rows = Array.from(body.querySelectorAll('.poster-row'));
      rows.forEach(r => r.classList.remove('drag-over-row'));

      const idx = findInsertionIndex(localY);
      // Position the indicator
      indicator.style.display = 'block';
      if (idx < rows.length) {
        indicator.style.top = rows[idx].offsetTop + 'px';
      } else {
        const last = rows[rows.length - 1];
        indicator.style.top = (last ? last.offsetTop + last.offsetHeight : 0) + 'px';
      }
    }

    function onUp(ev) {
      handle.classList.remove('active');
      row.classList.remove('dragging-row');
      indicator.remove();

      const localY = getLocalY(ev.type === 'touchend' ? ev : ev);
      const body = document.getElementById('poster-body');
      const rows = Array.from(body.querySelectorAll('.poster-row'));

      const idx = findInsertionIndex(localY);
      const srcIdx = rows.indexOf(dragSrcRow);

      if (idx !== srcIdx && idx !== srcIdx + 1) {
        if (idx >= rows.length) {
          body.appendChild(dragSrcRow);
        } else {
          body.insertBefore(dragSrcRow, rows[idx]);
        }
      }

      dragSrcRow = null;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      scheduleSave();
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
  }
}

// ── PLACEHOLDER ───────────────────────────────
function attachCEPlaceholder(el) {
  const ph = el.dataset.ph;
  if (!ph) return;
  const check = () => {
    const t = el.innerText.trim();
    if (!t || t === ph) { el.classList.add('ph'); el.innerText = ph; }
    else el.classList.remove('ph');
  };
  el.addEventListener('focus', () => { if (el.classList.contains('ph')) { el.innerText = ''; el.classList.remove('ph'); } });
  el.addEventListener('blur', () => { check(); scheduleSave(); });
  check();
}
document.querySelectorAll('[contenteditable][data-ph]').forEach(attachCEPlaceholder);

// ── WORD COUNT ────────────────────────────────
function updateWordCount() {
  let n = 0;
  document.querySelectorAll('.element-text:not(.ph)').forEach(el => {
    const t = el.innerText.replace(/\s+/g,' ').trim();
    if (t) n += t.split(' ').filter(Boolean).length;
  });
  document.getElementById('wordCount').textContent = 'Words: ' + n;
}

// ── SAVE / LOAD ───────────────────────────────
let saveTimer = null;
function scheduleSave() {
  if (loading) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 700);
}

async function doSave() {
  const rows = [];
  document.querySelectorAll('.poster-row').forEach(row => {
    const label = row.querySelector('.row-section-label');
    const elements = [];
    row.querySelectorAll('.row-content > .row-element').forEach(el => {
      const type = el.dataset.elemType;
      if (type === 'text') {
        const ta = el.querySelector('.element-text');
        elements.push({ type: 'text', content: ta.classList.contains('ph') ? '' : ta.innerHTML });
      } else if (type === 'image') {
        const img = el.querySelector('img');
        elements.push({ type: 'image', hasImg: !!img, imgSrc: img && img.src.startsWith('data:') ? img.src : null });
      }
    });
    rows.push({
      id: row.dataset.rowId,
      labelText: label && !label.classList.contains('ph') ? label.textContent : '',
      elements
    });
  });

  const data = {
    title: document.getElementById('poster-title').innerText,
    student: document.getElementById('student-name').innerText,
    refs: document.getElementById('refs-content').innerText,
    rows
  };
  try { localStorage.setItem(SK, JSON.stringify(data)); } catch(e) {}
}

function doLoad() {
  loading = true;
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) { buildDefault(); loading = false; return; }
    const data = JSON.parse(raw);

    const restoreCE = (id, val, ph) => {
      const el = document.getElementById(id);
      if (!el) return;
      if (val && val.trim() && val.trim() !== ph) { el.textContent = val; el.classList.remove('ph'); }
    };
    restoreCE('poster-title', data.title, 'TITLE');
    restoreCE('student-name', data.student, 'Student name');
    restoreCE('refs-content', data.refs, 'Referencing and acknowledgement of all quotations and sourced content.');

    if (data.rows && data.rows.length) {
      data.rows.forEach(r => addRow(r));
    } else {
      buildDefault();
    }
  } catch(e) { console.warn(e); buildDefault(); }
  loading = false;
}

// ── DEFAULT LAYOUT ────────────────────────────
// Matches the landscape screenshot: Row1=[text, image], Row2=[image, text]
function buildDefault() {
  addRow({
    labelText: 'Introduction',
    elements: [
      { type: 'text', content: '' },
      { type: 'image' }
    ]
  });
  addRow({
    labelText: 'Methods / Findings',
    elements: [
      { type: 'image' },
      { type: 'text', content: '' }
    ]
  });
}

// ── RESET ─────────────────────────────────────
function resetImages() {
  if (!confirm('Remove all images?')) return;
  document.querySelectorAll('.element-image.has-image').forEach(imgDiv => {
    const img = imgDiv.querySelector('img');
    if (img) img.remove();
    imgDiv.classList.remove('has-image');
    const ph = imgDiv.querySelector('.img-ph');
    if (ph) ph.style.display = '';
  });
  scheduleSave();
}

function resetAll() {
  if (!confirm('Reset everything?')) return;
  document.getElementById('poster-title').textContent = 'TITLE';
  document.getElementById('student-name').textContent = 'Student name';
  document.getElementById('refs-content').textContent = ' ';
  document.getElementById('poster-body').innerHTML = '';
  rowIdCounter = 0; elemIdCounter = 0;
  buildDefault();
  applyColour(DEFAULT_COLOUR);
  try { localStorage.removeItem(SK); localStorage.removeItem(SK_COL); localStorage.removeItem(SK_OR); } catch(e) {}
  updateWordCount();
}

// ── INIT ─────────────────────────────────────
window.addEventListener('load', () => {
  const savedOrient = localStorage.getItem(SK_OR) || 'landscape';
  if (savedOrient === 'portrait') {
    document.body.classList.add('portrait-mode');
    document.getElementById('orient-text').textContent = 'Landscape';
    document.getElementById('orientation-styles').textContent = '@media print{@page{size:A3 portrait;margin:0}}';
  } else {
    document.getElementById('orientation-styles').textContent = '@media print{@page{size:A3 landscape;margin:0}}';
  }

  const savedColour = localStorage.getItem(SK_COL) || DEFAULT_COLOUR;
  applyColour(savedColour);

  doLoad();
  fit();
  updateWordCount();
});

document.getElementById('sidebar-tab').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
document.addEventListener('input', () => { updateWordCount(); scheduleSave(); });
</script>
